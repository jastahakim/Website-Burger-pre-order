<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Web App</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --border: #d1d5db;
      --up: #15803d;
      --down: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 28px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    h1 { margin: 0 0 8px; }
    .desc { color: var(--muted); margin-bottom: 16px; }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 16px;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }

    #chart {
      min-height: 500px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    #analysis {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      background: #f8fafc;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 8px;
      margin-bottom: 8px;
    }

    .up { background: var(--up); }
    .down { background: var(--down); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Simple Trading Web App</h1>
      <p class="desc">Type a pair like <strong>BTC/USDT</strong> and click <strong>Analyze Market</strong>.</p>

      <div class="controls">
        <input id="pairInput" type="text" placeholder="BTC/USDT" value="BTC/USDT" />
        <button id="analyzeButton" type="button">Analyze Market</button>
      </div>

      <div id="chart"></div>
      <div id="analysis">Analysis result will appear here.</div>
    </section>
  </main>

  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    function normalizePair(raw) {
      return raw.trim().toUpperCase().replace(/\s+/g, '').replace('-', '/');
    }

    function toBinanceSymbol(pair) {
      return pair.replace('/', '');
    }

    function average(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function renderChart(pair) {
      document.getElementById('chart').innerHTML = '';

      new TradingView.widget({
        container_id: 'chart',
        symbol: `BINANCE:${toBinanceSymbol(pair)}`,
        interval: '60',
        timezone: 'Etc/UTC',
        theme: 'light',
        style: '1',
        locale: 'en',
        autosize: true,
        allow_symbol_change: false,
        enable_publishing: false,
        save_image: false
      });
    }

    async function analyzeMarket() {
      const input = document.getElementById('pairInput');
      const analysisEl = document.getElementById('analysis');
      const pair = normalizePair(input.value || 'BTC/USDT');
      const symbol = toBinanceSymbol(pair);

      input.value = pair;
      renderChart(pair);
      analysisEl.textContent = 'Analyzing market...';

      try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&limit=120`);
        if (!res.ok) {
          throw new Error('Could not fetch data. Please use a valid pair like BTC/USDT.');
        }

        const candles = await res.json();
        const closes = candles.map(candle => Number(candle[4]));
        const highs = candles.map(candle => Number(candle[2]));
        const lows = candles.map(candle => Number(candle[3]));

        const ma20 = average(closes.slice(-20));
        const ma50 = average(closes.slice(-50));
        const trend = ma20 >= ma50 ? 'Uptrend' : 'Downtrend';
        const trendClass = ma20 >= ma50 ? 'up' : 'down';
        const resistance = Math.max(...highs.slice(-30));
        const support = Math.min(...lows.slice(-30));

        analysisEl.innerHTML = `
          <span class="badge ${trendClass}">${trend}</span>
          <div><strong>Pair:</strong> ${pair}</div>
          <div><strong>Trend (MA20 vs MA50):</strong> ${ma20.toFixed(2)} vs ${ma50.toFixed(2)}</div>
          <div><strong>Resistance:</strong> ${resistance.toFixed(2)}</div>
          <div><strong>Support:</strong> ${support.toFixed(2)}</div>
          <p style="margin-top:10px;color:#6b7280;">Educational use only. Not financial advice.</p>
        `;
      } catch (error) {
        analysisEl.innerHTML = `<span style="color:#b91c1c;"><strong>Error:</strong> ${error.message}</span>`;
      }
    }

    document.getElementById('analyzeButton').addEventListener('click', analyzeMarket);
    renderChart('BTC/USDT');
  </script>
</body>
</html>
